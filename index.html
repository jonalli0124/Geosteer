function genTerrain(){const s=[];let base=0,fCD=0,dip=0;for(let i=0;i<5000;i++){dip+=(Math.random()-0.48)*0.5;dip=clamp(dip,-1.5,1.5);base+=dip;base=clamp(base,-55,55);let fault=false,fTh=0;fCD--;if(i>3&&fCD<=0&&Math.random()<RES.faultRate){const mx=40+(i/5000)*260;fTh=(Math.random()>0.5?1:-1)*(25+Math.random()*mx);base+=clamp(fTh*0.4,-45,45);base=clamp(base,-70,70);fault=true;fCD=1+Math.floor(Math.random()*4);}let thief=false;if(!fault&&Math.random()<RES.thiefBase)thief=true;s.push({base,fault,fTh:Math.abs(fTh),gas:!fault&&Math.random()<0.04,thief});}for(let i=0;i<s.length;i++){if(s[i].thief){const span=3+Math.floor(Math.random()*6);for(let j=1;j<=span&&i+j<s.length;j++)s[i+j].thief=true;i+=span;}}return s;}
function getBounds(cY,off,h,ft){const tgtShrink=ft?Math.max(0.3,1.0-ft*RES.zoneShrink):1.0;const sc=h*0.95,bs=[];let a=0;for(let i=0;i<FM.length;i++){const th=FM[i].tgt?FM[i].th*tgtShrink:FM[i].th;const top=cY+off-sc/2+(a/FMT)*sc;a+=th;bs.push({fm:FM[i],top,bot:cY+off-sc/2+(a/FMT)*sc});}return bs;}

function drawBit(cx,cy,kick){
if(bitSheetReady){
const frame=Math.floor(g.fr/4)%BIT_FRAMES;
const sx=frame*BIT_FW;
if(kick){ctx.globalAlpha=0.8;ctx.filter="hue-rotate(320deg) saturate(2)";}
ctx.drawImage(bitSheet,sx,0,BIT_FW,BIT_FH,cx-BIT_FW/2+12,cy-BIT_FH/2,BIT_FW,BIT_FH);
if(kick){ctx.globalAlpha=1;ctx.filter="none";}
}else{
const PX=4,cols=kick?BCK:BC;for(let r=0;r<BIT.length;r++)for(let c=0;c<BIT[0].length;c++){const v=BIT[r][c];if(!v)continue;ctx.fillStyle=cols[v];ctx.fillRect(cx-BIT[0].length*PX/2+PX*3+c*PX,cy-BIT.length*PX/2+r*PX,PX,PX);}
}}
function drawTank(x,y,w,h,level,danger){ctx.strokeStyle="#555";ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);const fillH=h*clamp(level/750,0,1);ctx.fillStyle=danger?(level>500?"#cc2222":"#cc8822"):"#228844";ctx.fillRect(x+1,y+h-fillH,w-2,fillH);const nomY=y+h*(1-500/750);ctx.strokeStyle="#00ff4466";ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(x,nomY);ctx.lineTo(x+w,nomY);ctx.stroke();ctx.setLineDash([]);ctx.font=`bold ${Math.max(11,w*0.32)}px 'Courier New',monospace`;ctx.fillStyle=danger?"#ff4444":"#ddd";ctx.textAlign="center";ctx.fillText(`${level.toFixed(0)}`,x+w/2,y+h+15);ctx.font=`${Math.max(9,w*0.24)}px 'Courier New',monospace`;ctx.fillStyle="#888";ctx.fillText("bbl",x+w/2,y+h+26);if(level>530){ctx.fillStyle="#ff4444aa";ctx.font=`bold ${Math.max(14,w*0.4)}px monospace`;ctx.fillText("▲",x+w/2,y-5);}else if(level<470){ctx.fillStyle="#4488ccaa";ctx.font=`bold ${Math.max(14,w*0.4)}px monospace`;ctx.fillText("▼",x+w/2,y-5);}ctx.textAlign="left";}

let lastFrameTime=0;
const FRAME_MS=1000/60; // cap at 60fps
function tick(timestamp){
if(timestamp-lastFrameTime<FRAME_MS){requestAnimationFrame(tick);return;}
lastFrameTime=timestamp;
const W=cv.width,H=cv.height;if(W<10||H<10){requestAnimationFrame(tick);return;}
const isPortrait=H>W;const isTouch='ontouchstart' in window;
const S=isPortrait?Math.min(W/320,H/650):Math.min(W/400,H/550);
const hdrH=Math.round(32*S),topH=Math.round(isPortrait?90*S:110*S),footH=Math.round(28*S);
const ctrlH=Math.round(isTouch?(isPortrait?150*S:120*S):100*S);
const xsH=H-hdrH-topH-footH-ctrlH,grW=Math.round(50*S);
const xsW=W-grW,xsY=hdrH+topH,xsCY=xsY+xsH/2;
const bitSX=xsW/2,vsW=Math.round(Math.min(W*0.22,90*S));
const fmOff=(TGT_FRAC-0.5)*xsH*0.95;
g.fr++;const d=diff(g.ft);

if(g.ph==="playing"){
g.totalFr++;
if(g.fr%80===0){g.drift+=(Math.random()-0.5)*0.025*d;g.drift=clamp(g.drift,-0.035,0.035);}

// Slide mechanic
if(g.slideOverheat){g.slideOhTimer--;g.slide=false;inp.sld=0;if(g.slideOhTimer<=0){g.slideOverheat=false;addN("MOTOR COOLED","info");}}else{g.slide=!!inp.sld;}
if(g.slide){g.slideFr++;g.slideHeat+=0.10;}else{g.slideHeat=Math.max(0,g.slideHeat-0.12);}
if(g.slideHeat>=100&&!g.slideOverheat){g.slideOverheat=true;g.slideOhTimer=180;addN("MOTOR OVERHEAT!","danger");}

const sm=g.slide?1.8:0.55;

for(let sx=0;sx<xsW;sx+=stripW){const wx=g.sx+(sx-bitSX);const si2=clamp(Math.floor(wx/SEG_W),0,g.terr.length-2);const sf2=((wx%SEG_W)+SEG_W)%SEG_W/SEG_W;const cb2=lerp(g.terr[si2].base,g.terr[si2+1].base,sf2);const bds=getBounds(xsCY,cb2-fmOff,xsH,g.ft);for(const b of bds){const h=b.bot-b.top;if(h<=0)continue;const gr=ctx.createLinearGradient(0,b.top,0,b.bot);gr.addColorStop(0,b.fm.t);gr.addColorStop(0.5,b.fm.m);gr.addColorStop(1,b.fm.b);ctx.fillStyle=gr;ctx.fillRect(sx,b.top,stripW,h);}for(const b of bds){if(b.fm.tgt){ctx.fillStyle="#00ff4455";ctx.fillRect(sx,b.top|0,stripW,2);ctx.fillRect(sx,b.bot|0,stripW,2);}}if(g.terr[si2].fault&&sf2<0.04){ctx.fillStyle="#ff00ff55";ctx.fillRect(sx,xsY,3,xsH);}if(g.terr[si2].thief){ctx.fillStyle=g.lcmActive?"#44aaff20":"#ff440040";ctx.fillRect(sx,xsY,stripW,xsH);}}
const lsi=clamp(Math.floor((g.sx-bitSX)/SEG_W),0,g.terr.length-2);const lBs=getBounds(xsCY,g.terr[lsi].base-fmOff,xsH,g.ft);ctx.font=`bold ${Math.round(12*S)}px 'Courier New',monospace`;for(const b of lBs){const mid=(b.top+b.bot)/2;if(mid>xsY+3&&mid<xsY+xsH-3&&(b.bot-b.top)>14){ctx.fillStyle=b.fm.tgt?"#00ff44cc":"#ffffff55";ctx.shadowColor="#000";ctx.shadowBlur=4;ctx.fillText(b.fm.n,7,mid+4);ctx.shadowBlur=0;}}
for(let i=1;i<g.wp.length;i+=2){const p0=g.wp[i-1],p1=g.wp[i],x0=bitSX+(p0.x-g.sx),x1=bitSX+(p1.x-g.sx);if(x1<-5||x0>xsW+5)continue;const dlsV=p1.dls||0;
const dlsC2=dlsV>10?"#8a5030":dlsV>5?"#8a7030":"#4a6a8e";
ctx.strokeStyle=dlsC2;ctx.lineWidth=Math.round(6*S);
ctx.beginPath();ctx.moveTo(x0,xsCY+p0.y);ctx.lineTo(x1,xsCY+p1.y);ctx.stroke();
ctx.strokeStyle="#7a9abc44";ctx.lineWidth=Math.round(2*S);

const cf2=FM.find(f=>f.n===g.fm);ctx.font=`bold ${Math.round(13*S)}px 'Courier New',monospace`;ctx.fillStyle=cf2&&cf2.tgt?"#00ff44":"#ff4400";ctx.shadowColor="#000";ctx.shadowBlur=4;ctx.fillText(cf2&&cf2.tgt?"● IN ZONE":"● "+g.fm,bitSX+32,xsCY+g.by+5);ctx.shadowBlur=0;
ctx.textAlign="center";g.notifs.forEach((n,i)=>{ctx.globalAlpha=clamp(1-(g.fr-n.b)/220,0,1);ctx.font=`bold ${Math.round(15*S)}px 'Courier New',monospace`;ctx.shadowColor="#000";ctx.shadowBlur=6;ctx.fillStyle=n.tp==="danger"?"#ff2222":n.tp==="warn"?"#ddaa00":"#00ff44";ctx.fillText(n.t,xsW/2,xsY+Math.round(22*S)+i*Math.round(18*S));ctx.shadowBlur=0;});ctx.globalAlpha=1;ctx.textAlign="left";

// Gamma
ctx.fillStyle="#080808";ctx.fillRect(xsW,xsY,grW,xsH);const rsi=clamp(Math.floor(g.sx/SEG_W),0,g.terr.length-2);const rBs=getBounds(xsCY,g.terr[rsi].base-fmO,xsH,g.ft);for(const b of rBs){if(b.top>xsY-5&&b.bot<xsY+xsH+5){ctx.fillStyle=b.fm.lc+"33";ctx.fillRect(xsW,Math.max(xsY,b.top),4,Math.min(b.bot,xsY+xsH)-Math.max(xsY,b.top));if(b.bot-b.top>14){const mid=(b.top+b.bot)/2;if(mid>xsY&&mid<xsY+xsH){ctx.font=`bold ${Math.round(8*S)}px 'Courier New',monospace`;ctx.fillStyle=b.fm.tgt?"#00ff44":"#778";ctx.fillText(b.fm.lbl,xsW+6,mid+2);}}if(b.fm.tgt){ctx.fillStyle="#00ff4444";ctx.fillRect(xsW,Math.max(xsY,b.top),grW,2);ctx.fillRect(xsW,Math.min(b.bot,xsY+xsH),grW,2);}}}
const rgl2=g.gl.slice(-Math.floor(xsH/2));if(rgl2.length>1){ctx.strokeStyle="#00bbee";ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<rgl2.length;i++){const y=xsY+3+(i/rgl2.length)*(xsH-6);const x=xsW+clamp(rgl2[i].gr/200,0,1)*grW;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}

// HUD
const hudH=Math.round(20*S),hudY=xsY+xsH-hudH;ctx.fillStyle="rgba(0,0,0,0.82)";ctx.fillRect(0,hudY,xsW,hudH);
const hudF=Math.min(Math.round(10*S),13);ctx.font=`bold ${hudF}px 'Courier New',monospace`;
ctx.fillStyle="#00dd44";ctx.fillText(`${g.ft.toFixed(0)}'`,4,hudY+hudH*0.65);
// MW window — always visible. Compute effective PP/Frac for current formation
const si3=clamp(Math.floor(g.sx/SEG_W),0,g.terr.length-2);
const hCr2=g.ft*0.0001;const hD2=diff(g.ft);
const hPP2=Math.min(RES.ppStart+g.ft*RES.ppRate,RES.ppCap);
const hBF=hPP2+RES.window;
const hTF2=g.thiefActive&&!g.lcmActive?Math.max(hPP2-RES.thiefDrop,10.0):hBF;
const hLo=Math.min(hPP2,hTF2),hHi=Math.max(hPP2,hTF2);
const mwOK=g.mw>=hLo&&g.mw<=hHi;
ctx.fillStyle=mwOK?"#00dd44":"#ff4444";ctx.fillText(`MW:${g.mw.toFixed(1)}`,xsW*0.10,hudY+hudH*0.65);
ctx.fillStyle=hTF2<hPP2?"#ff4444":g.thiefActive?"#ff8844":"#44aaff";ctx.fillText(`[${hLo.toFixed(1)}-${hHi.toFixed(1)}]`,xsW*0.23,hudY+hudH*0.65);
if(xsW>280){ctx.fillStyle="#aaa";ctx.fillText(`ROP:${g.rop.toFixed(0)}`,xsW*0.38,hudY+hudH*0.65);}
ctx.fillStyle="#ff3333";ctx.fillText(`GAS:${g.gas.toFixed(0)}`,xsW*(xsW>280?0.50:0.38),hudY+hudH*0.65);
const oozF=g.oozFt/g.oozMax;if(oozF>0.05){ctx.fillStyle=oozF>0.6?"#ff2222":"#ff8844";ctx.fillText(`OOZ:${g.oozFt.toFixed(0)}'`,xsW*(xsW>280?0.62:0.52),hudY+hudH*0.65);}else{const zp2=g.totFt>0?(g.inZ/g.totFt*100):0;ctx.fillStyle=zp2>70?"#00dd44":"#ddaa00";ctx.fillText(`ZN:${zp2.toFixed(0)}%`,xsW*(xsW>280?0.62:0.52),hudY+hudH*0.65);}
ctx.fillStyle=g.slideOverheat?"#ff2222":(g.slide?"#ffaa00":"#555");ctx.fillText(g.slideOverheat?"HOT":(g.slide?"SLD":"ROT"),xsW*(xsW>280?0.74:0.65),hudY+hudH*0.65);
ctx.fillStyle=g.costPerFt<100?"#00ff44":g.costPerFt<130?"#ddcc00":"#ff4444";ctx.font=`bold ${Math.min(Math.round(11*S),14)}px 'Courier New',monospace`;ctx.textAlign="right";ctx.fillText(`$${g.costPerFt.toFixed(0)}/ft`,xsW-4,hudY+hudH*0.65);ctx.textAlign="left";

// FOOTER
const ftY=xsY+xsH;ctx.fillStyle="#0a0a0a";ctx.fillRect(0,ftY,W,footH);ctx.font=`bold ${Math.round(10*S)}px 'Courier New',monospace`;ctx.fillStyle=(g.pit>550||g.pit<450||g.leaseW||g.oozFt>250||g.slideOverheat||g.thiefActive)?"#ff8888":"#aaa";ctx.fillText("TEAM: "+g.cmt,5,ftY+footH*0.62);

// CONTROLS
if(g.ph==="playing"){
const cYc=ftY+footH;ctx.fillStyle="#050505";ctx.fillRect(0,cYc,W,ctrlH);
const dSz=Math.min(ctrlH-10,W*0.22),db=dSz/3,dX=8+dSz/2,dY2=cYc+ctrlH/2;
function rrC(cx,cy2,w,h,r){ctx.beginPath();const x=cx-w/2,y=cy2-h/2;ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function dB(cx,cy2,label,act){ctx.fillStyle=act?"#00ff4118":"#080808";ctx.strokeStyle=act?"#00dd44":"#00ff4120";ctx.lineWidth=2;rrC(cx,cy2,db,db,5);ctx.fill();ctx.stroke();ctx.fillStyle=act?"#00dd44":"#008822";ctx.font=`bold ${Math.max(13,db*0.40)}px 'Courier New',monospace`;ctx.textAlign="center";ctx.fillText(label,cx,cy2+db*0.15);}
dB(dX,dY2-db,"▲",inp.u);dB(dX,dY2+db,"▼",inp.d);dB(dX-db,dY2,"◀",inp.l);dB(dX+db,dY2,"▶",inp.r);ctx.fillStyle="#080808";rrC(dX,dY2,db*0.5,db*0.5,3);ctx.fill();
const tankAreaX=dX+dSz/2+Math.round(10*S),tankAreaW=Math.round(50*S),tankH3=ctrlH-20;
drawTank(tankAreaX,cYc+6,tankAreaW,tankH3-12,g.pit,g.pit>550||g.pit<450);
ctx.fillStyle="#222";ctx.fillRect(tankAreaX,cYc+tankH3,tankAreaW,6);ctx.fillStyle=g.slideHeat>70?"#ff4444":g.slideHeat>40?"#ddaa00":"#228844";ctx.fillRect(tankAreaX,cYc+tankH3,tankAreaW*(g.slideHeat/100),6);
ctx.font=`${Math.round(7*S)}px 'Courier New',monospace`;ctx.fillStyle="#888";ctx.textAlign="center";ctx.fillText("SLIDE",tankAreaX+tankAreaW/2,cYc+tankH3+Math.round(14*S));ctx.textAlign="left";
const btnStartX=tankAreaX+tankAreaW+Math.round(12*S),btnArea=W-btnStartX-5,gap=Math.round(6*S),cols=4,bW=(btnArea-gap*(cols+1))/cols,bH=Math.min(ctrlH*0.46,Math.round(55*S)),bY0=cYc+(ctrlH-bH)/2;
const btns=[{l:"MW+",s:"[1]",k:"mU",c:"#ddaa00",col:0},{l:"MW-",s:"[2]",k:"mD",c:"#4488cc",col:1},{l:"SLD",s:g.slideOverheat?"HOT!":(g.slide?"ON [3]":"[3]"),k:"sld",c:g.slideOverheat?"#ff2222":(g.slide?"#ffaa00":"#004411"),col:2},{l:"LCM",s:`${g.lcm} [4]`,k:"lcm",c:g.lcm>0?"#44aaff":"#882222",col:3}];
btns.forEach(b=>{const bx=btnStartX+gap+b.col*(bW+gap)+bW/2,by=bY0+bH/2,act=!!inp[b.k];ctx.fillStyle=act?"#00ff4118":"#0a0a0a";ctx.strokeStyle=act?b.c:"#00ff4120";ctx.lineWidth=2;rrC(bx,by,bW,bH,6);ctx.fill();ctx.stroke();ctx.fillStyle=act?b.c:(b.k==="lcm"&&g.lcm<=0?"#442222":"#008822");ctx.font=`bold ${Math.round(13*S)}px 'Courier New',monospace`;ctx.textAlign="center";ctx.fillText(b.l,bx,by-Math.round(2*S));ctx.font=`${Math.round(9*S)}px 'Courier New',monospace`;ctx.fillStyle="#004411";ctx.fillText(b.s,bx,by+bH*0.30);});ctx.textAlign="left";
g._br={dX,dY:dY2,db,btns:btns.map(b=>({...b,bx:btnStartX+gap+b.col*(bW+gap),by:bY0,bw:bW,bh:bH}))};
}

// DEATH
if(g.ph==="dead"){ctx.fillStyle="rgba(0,0,0,0.90)";ctx.fillRect(0,0,W,H);ctx.textAlign="center";
ctx.shadowColor="#ff2222";ctx.shadowBlur=20;ctx.font=`bold ${Math.round(30*S)}px 'Courier New',monospace`;ctx.fillStyle="#ff2222";ctx.fillText("WELL LOST",W/2,H*0.10);ctx.shadowBlur=0;
ctx.font=`bold ${Math.round(12*S)}px 'Courier New',monospace`;ctx.fillStyle=RES.color;ctx.fillText(RES.name,W/2,H*0.15);
ctx.font=`bold ${Math.round(14*S)}px 'Courier New',monospace`;ctx.fillStyle="#ff8844";ctx.fillText(g.deathReason,W/2,H*0.19);
const zpF=g.totFt>0?(g.inZ/g.totFt*100):0;const slideP=g.totalFr>0?Math.round(g.slideFr/g.totalFr*100):0;
const finalScore=g.costPerFt>0?Math.round(g.ft*(92/g.costPerFt)*(zpF/100)):0;
ctx.fillStyle="#00ffcc";ctx.font=`bold ${Math.round(32*S)}px 'Courier New',monospace`;ctx.fillText(`SCORE: ${finalScore.toLocaleString()}`,W/2,H*0.24);

ctx.font=`bold ${Math.round(18*S)}px 'Courier New',monospace`;ctx.fillText(`${g.ft.toFixed(0)}'  @  $${g.costPerFt.toFixed(0)}/ft`,W/2,H*0.30);
ctx.font=`${Math.round(11*S)}px 'Courier New',monospace`;ctx.fillStyle="#888";ctx.fillText(`Zone: ${zpF.toFixed(1)}%  |  $/ft efficiency: ${(g.costPerFt>0?(92/g.costPerFt*100).toFixed(0):0)}%`,W/2,H*0.34);

ctx.fillText(`Zone:${zpF.toFixed(1)}%  |  Total: $${(g.costTotal/1000).toFixed(0)}K  |  Slide:${slideP}%`,W/2,H*0.39);

// INPUT
const resOrder=["olmos","sanmiguel","austinchalk","eagleford"];
function startGame(){const key=resOrder[g._selRes!=null?g._selRes:1];setReservoir(key);g=init();g._selRes=resOrder.indexOf(key);g.ph="playing";}
function proc(tc,mv){const r=cv.getBoundingClientRect(),x=tc.clientX-r.left,y=tc.clientY-r.top,br=g._br;if(!br)return;const dx=x-br.dX,dy=y-br.dY,db=br.db;if(Math.abs(dx)<db*2.2&&Math.abs(dy)<db*2.2){if(dy<-db*0.25&&Math.abs(dx)<db*0.95)inp.u=1;if(dy>db*0.25&&Math.abs(dx)<db*0.95)inp.d=1;if(dx<-db*0.25&&Math.abs(dy)<db*0.95)inp.l=1;if(dx>db*0.25&&Math.abs(dy)<db*0.95)inp.r=1;}for(const b of br.btns){if(x>=b.bx&&x<=b.bx+b.bw&&y>=b.by&&y<=b.by+b.bh){if(b.k==="sld"&&!mv)inp.sld=inp.sld?0:1;else if(b.k==="lcm"&&!mv)inp.lcm=1;else if(b.k!=="sld"&&b.k!=="lcm")inp[b.k]=1;}}}
function rst(){inp.u=0;inp.d=0;inp.l=0;inp.r=0;inp.mU=0;inp.mD=0;}
cv.addEventListener("touchstart",e=>{e.preventDefault();if(g.ph==="title"){const r=cv.getBoundingClientRect();const ty=e.changedTouches[0].clientY-r.top;const h=r.height;if(ty<h*0.4){g._selRes=(((g._selRes!=null?g._selRes:1)-1+4)%4);}else if(ty>h*0.6){startGame();}else{g._selRes=(((g._selRes!=null?g._selRes:1)+1)%4);}return;}if(g.ph==="dead"){const sel=g._selRes;g=init();g._selRes=sel;return;}for(const tc of e.changedTouches)proc(tc);},{passive:false});
cv.addEventListener("touchmove",e=>{e.preventDefault();rst();for(const tc of e.touches)proc(tc,true);},{passive:false});
cv.addEventListener("touchend",e=>{e.preventDefault();rst();for(const tc of e.touches)proc(tc,true);},{passive:false});
cv.addEventListener("mousedown",e=>{if(g.ph==="title"){startGame();return;}if(g.ph==="dead"){const sel=g._selRes;g=init();g._selRes=sel;return;}proc({clientX:e.clientX,clientY:e.clientY});});
window.addEventListener("mouseup",()=>rst());
window.addEventListener("keydown",e=>{
if(g.ph==="title"){if(e.key==="ArrowUp"||e.key==="w"){g._selRes=(((g._selRes!=null?g._selRes:1)-1+4)%4);e.preventDefault();}if(e.key==="ArrowDown"||e.key==="s"){g._selRes=(((g._selRes!=null?g._selRes:1)+1)%4);e.preventDefault();}if(e.key===" "||e.key==="Enter"){e.preventDefault();startGame();}return;}
if(g.ph==="dead"){if(e.key===" "||e.key==="Enter"){e.preventDefault();const sel=g._selRes;g=init();g._selRes=sel;}return;}
if(e.key==="ArrowUp"||e.key==="w"){inp.u=1;e.preventDefault();}if(e.key==="ArrowDown"||e.key==="s"){inp.d=1;e.preventDefault();}if(e.key==="ArrowLeft"||e.key==="a"){inp.l=1;e.preventDefault();}if(e.key==="ArrowRight"||e.key==="d"){inp.r=1;e.preventDefault();}if(e.key==="1"||e.key==="q")inp.mU=1;if(e.key==="2"||e.key==="z")inp.mD=1;if(e.key==="3"||e.key==="f")inp.sld=inp.sld?0:1;if(e.key==="4"||e.key==="e")inp.lcm=1;});
window.addEventListener("keyup",e=>{if(e.key==="ArrowUp"||e.key==="w")inp.u=0;if(e.key==="ArrowDown"||e.key==="s")inp.d=0;if(e.key==="ArrowLeft"||e.key==="a")inp.l=0;if(e.key==="ArrowRight"||e.key==="d")inp.r=0;if(e.key==="1"||e.key==="q")inp.mU=0;if(e.key==="2"||e.key==="z")inp.mD=0;});
requestAnimationFrame(tick);
</script>
